name: Bug report
description: Report a defect in import, matching, generation, or export behavior.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include input SQL/JSON and the expected result when possible.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, browser, and whether Qdrant / AI gateway were enabled.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste trimmed logs or screenshots here.
