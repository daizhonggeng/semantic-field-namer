services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      APP_NAME: Semantic Field Namer
      API_PREFIX: /api
      SECRET_KEY: change-this-in-production-with-at-least-32-bytes
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DATABASE_URL: sqlite:////app/data/semantic_field_namer.db
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: semantic_fields
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-BAAI/bge-small-zh-v1.5}
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  qdrant_data:
  backend_data:
